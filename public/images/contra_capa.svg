<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004b87"/>
      <stop offset="100%" stop-color="#003863"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009b3a"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1600" fill="url(#bg)"/>

  <rect x="0" y="0" width="1200" height="20" fill="url(#accent)"/>

  <g transform="translate(600, 240)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#009b3a" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#009b3a" stroke-width="2" opacity="0.8"/>

    <g transform="translate(0, -20)">
      <path d="M 0 -35 C 20 -35 35 -20 35 0 C 35 20 0 55 0 55 C 0 55 -35 20 -35 0 C -35 -20 -20 -35 0 -35 Z"
            fill="#009b3a" opacity="0.9"/>
      <circle cx="0" cy="0" r="12" fill="#ffffff"/>
      <circle cx="0" cy="0" r="6" fill="#004b87"/>
    </g>
  </g>

  <g transform="translate(600, 450)" text-anchor="middle">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#ffffff">Vigilância Socioassistencial</text>
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#a8c8e8">SUAS / Rio de Janeiro</text>
  </g>

  <image x="500" y="530" href="/images/logo_vigilancia_coovig.svg" width="200" height="200" />

  <g transform="translate(600, 780)" text-anchor="middle">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">COORDENAÇÃO ESTADUAL DE</text>
    <text x="0" y="36" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">VIGILÂNCIA SOCIOASSISTENCIAL</text>
    <text x="0" y="80" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a8c8e8">Secretaria de Estado de Desenvolvimento Social e Direitos Humanos</text>
  </g>

  <g transform="translate(600, 960)" text-anchor="middle">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#009b3a" letter-spacing="3">EQUIPE RESPONSÁVEL</text>
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#ffffff">Matheus Lopes — Coordenador</text>
    <text x="0" y="68" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#ffffff">Junier Goulart — Assessor</text>
    <text x="0" y="96" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#ffffff">Matheus de Freitas — Assessor</text>
  </g>

  <g transform="translate(600, 1180)" text-anchor="middle">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#009b3a" letter-spacing="3">CONTATO</text>
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#a8c8e8">coordvigilanciasgs@sedsdh.rj.gov.br</text>
  </g>

  <g transform="translate(80, 1450)">
    <rect x="0" y="0" width="1040" height="100" fill="#003863" rx="8"/>
    <text x="40" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff">SEDSODH</text>
    <text x="40" y="68" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#a8c8e8">Secretaria de Estado de Desenvolvimento Social e Direitos Humanos</text>
    <text x="1000" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#a8c8e8" text-anchor="end">GOVERNO DO ESTADO</text>
    <text x="1000" y="68" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#7fa5c8" text-anchor="end">DO RIO DE JANEIRO</text>
